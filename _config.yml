# Telar - Digital Storytelling Framework
# https://telar.org

# Site Settings
title: "La Virgencita"
description: "This website will be an exploration of the story of Our Lady of Guadalupe and her status as a symbol within Mexican/Chicanx culture. The Virgin of Guadalupe is a fascinating cultural and religious figure that serves as many different things to different people. This website will focus on her impact and presence among the Chicanx and Mexican immigrant communities in the Unites States. I will begin with the story of Her first appearance as Guadalupe, including her origins as Tonantzin, and then I will move forward with analyzing her place within Chicanx and Mexican art, activism, religious traditions, and daily life. It is now more important than ever that we work to document and preserve Chicanx and Mexican culture."
url: "https://gemmagacevedo.github.io"
baseurl: "/our-lady-of-guadalupe"
author: "Gemma Acevedo"
telar_theme: "paisajes" # Options: paisajes, neogranadina, santa-barbara, austin, trama, or custom
logo: ""
telar_language: "en"

# Google Sheets Integration
# See https://telar.org/docs/your-data/google-sheets/ for detailed setup instructions.
google_sheets:
  enabled: true
  published_url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSa8Jy0DwsPZKIUrc9bb7o1h_Kit1vpIuyR8eHQzKiYIPRB0FhKgSHY9blcJof5XC7dIwZlzSEt8Nw4/pubhtml"

# Story Interface Settings
story_interface:
  show_on_homepage: true
  show_story_steps: true
  show_object_credits: true
  include_demo_content: false # Turn off for production sites

# Collection Interface Settings
collection_interface:
  browse_and_search: true
  show_link_on_homepage: true
  show_sample_on_homepage: true
  featured_count: 4

# Story Protection (optional)
# story_key: ""

#
#
#
# PLEASE DO NOT EDIT BELOW THIS LINE UNLESS YOU KNOW WHAT YOU ARE DOING
#
#
#

# Collections
collections:
  stories:
    output: true
    permalink: /stories/:name/
  objects:
    output: true
    permalink: /objects/:name/
  glossary:
    output: true
    permalink: /glossary/:name/
  pages:
    output: true
    permalink: /:name/

# Collections Directory
collections_dir: _jekyll-files

# Build Settings
markdown: kramdown
permalink: pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .github
  - README.md
  - docs/
  - scripts/

# Defaults
defaults:
  - scope:
      path: ""
      type: "stories"
    values:
      layout: "story"
  - scope:
      path: ""
      type: "objects"
    values:
      layout: "object"
  - scope:
      path: ""
      type: "glossary"
    values:
      layout: "glossary"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "user-page"

# Tell Jekyll not to expect dates for these collections
future: true
show_drafts: false

# Telar Settings (version information)
telar:
  version: "0.9.1-beta"
  release_date: "2026-02-05"

# Plugins
plugins:
  - jekyll-seo-tag

# WEBrick server configuration for development (enables CORS for IIIF)
webrick:
  headers:
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Methods: "GET, POST, OPTIONS"
    Access-Control-Allow-Headers: "Content-Type"

# Development & Testing
development-features:
  christmas_tree_mode: false
  viewer_preloading:
    max_viewer_cards: 10
    preload_steps: 6
    loading_threshold: 5
    min_ready_viewers: 3
  skip_stories: false
  skip_collections: false
